name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - claude/division-math-game-6D7tl
  workflow_dispatch:

# Allow the workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let in-progress runs finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables Pages automatically if it isn't already turned on
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo root is the site (index.html lives at the root)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
