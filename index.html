<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Math Blitz — Division</title>

<!-- React preferred: loaded via CDN so everything stays in one file -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --bg: #0c0f17;
    --bg-2: #141a26;
    --panel: #1a2233;
    --panel-2: #222c42;
    --text: #eef2ff;
    --muted: #8c97b3;
    --accent: #5b8cff;
    --accent-2: #7aa2ff;
    --green: #28d17c;
    --green-glow: rgba(40, 209, 124, 0.55);
    --red: #ff5470;
    --red-glow: rgba(255, 84, 112, 0.55);
    --amber: #ffb347;
    --radius: 16px;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1b2438 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #root {
    max-width: 540px;
    margin: 0 auto;
    padding: 18px 16px 40px;
    min-height: 100vh;
  }

  h1, h2, h3 { margin: 0; }

  .title {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.5px;
    text-align: center;
    background: linear-gradient(90deg, var(--accent-2), #c6b3ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-top: 6px;
    margin-bottom: 22px;
    font-size: 14px;
  }

  /* ---------- Settings ---------- */
  .panel {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .seg {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .seg button, .chip {
    flex: 1 1 0;
    min-width: 64px;
    padding: 12px 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease, border-color .15s ease;
  }
  .seg button:active, .chip:active { transform: scale(0.96); }
  .seg button.on, .chip.on {
    background: linear-gradient(180deg, var(--accent), #3f6fe0);
    border-color: var(--accent-2);
    box-shadow: 0 6px 16px rgba(91,140,255,0.35);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
  }
  .toggle-row:last-child { margin-bottom: 0; }
  .toggle-row .tlabel { font-weight: 700; font-size: 15px; }
  .toggle-row .thint { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .switch {
    position: relative;
    width: 52px; height: 30px;
    border-radius: 999px;
    background: #38415a;
    border: none;
    cursor: pointer;
    transition: background .18s ease;
    flex: 0 0 auto;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    transition: transform .18s ease;
  }
  .switch.on { background: var(--green); }
  .switch.on::after { transform: translateX(22px); }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    outline: none;
    transition: border-color .15s ease;
  }
  input:focus { border-color: var(--accent); }

  .mode-select {
    width: 100%;
    padding: 13px 40px 13px 14px;
    border-radius: 12px;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238c97b3' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    transition: border-color .15s ease;
  }
  .mode-select:focus { border-color: var(--accent); }
  .mode-select option { background: var(--panel); color: var(--text); }

  .row2 { display: flex; gap: 12px; }
  .row2 > .field { flex: 1; margin-bottom: 0; }

  .start-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(180deg, #34d27e, #18a661);
    box-shadow: 0 10px 24px rgba(40,209,124,0.35);
    transition: transform .08s ease, filter .15s ease;
    margin-top: 6px;
  }
  .start-btn:active { transform: scale(0.98); filter: brightness(1.05); }

  /* ---------- Game ---------- */
  .gtop {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .stat { text-align: center; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .v { font-size: 22px; font-weight: 900; }
  .score-pop { animation: pop .25s ease; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.35); color:var(--green)} 100%{transform:scale(1)} }

  .time-bonus {
    font-size: 13px;
    font-weight: 800;
    color: var(--amber);
    min-height: 18px;
    animation: bonusFly .9s ease forwards;
  }
  @keyframes bonusFly {
    0%   { opacity:0; transform:translateY(2px); }
    15%  { opacity:1; }
    75%  { opacity:1; transform:translateY(-10px); }
    100% { opacity:0; transform:translateY(-14px); }
  }

  .fire-bar {
    text-align: center;
    font-size: 28px;
    min-height: 38px;
    letter-spacing: 2px;
    margin: 2px 0 8px;
  }
  .fire-bar span { display: inline-block; animation: flicker 1.1s infinite alternate; }
  @keyframes flicker { from { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px #ff8c2e); } to { transform: translateY(-3px) scale(1.12); filter: drop-shadow(0 0 10px #ff5e2e); } }

  .timer-track {
    height: 8px;
    border-radius: 999px;
    background: var(--panel-2);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--amber));
    border-radius: 999px;
    transition: width .12s linear;
  }
  .timer-fill.low { background: linear-gradient(90deg, var(--amber), var(--red)); }

  .problem {
    text-align: center;
    font-size: clamp(46px, 14vw, 76px);
    font-weight: 900;
    letter-spacing: 1px;
    margin: 18px 0 6px;
    text-shadow: 0 4px 24px rgba(91,140,255,0.25);
  }
  .problem .op { color: var(--accent-2); margin: 0 8px; }

  .slots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 14px 0 26px;
    min-height: 76px;
  }
  .slot {
    width: 56px; height: 72px;
    border-radius: 14px;
    background: var(--panel);
    border: 2px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 900;
    transition: border-color .12s ease, background .12s ease;
  }
  .slot.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,140,255,0.25); }
  .slot.locked { background: rgba(40,209,124,0.16); border-color: var(--green); color: var(--green); }
  .slot.locked.first { animation: lockPop .28s ease; }
  @keyframes lockPop { 0%{transform:scale(0.6); opacity:0.4} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }
  .slot.wrong { animation: shake .3s ease; background: rgba(255,84,112,0.22); border-color: var(--red); color: var(--red); }
  .slot.reveal { animation: revealPop .25s ease forwards; }
  @keyframes revealPop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .key {
    padding: 22px 0;
    font-size: 30px;
    font-weight: 900;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(180deg, var(--panel-2), #1a2236);
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 6px 0 #0c1120, var(--shadow);
    transition: transform .06s ease, box-shadow .06s ease, background .1s ease;
    user-select: none;
  }
  .key:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #0c1120, var(--shadow);
    background: linear-gradient(180deg, #2a3550, #202940);
  }
  .key.flash-green { background: linear-gradient(180deg, var(--green), #18a661); border-color: var(--green); }
  .key.flash-red { background: linear-gradient(180deg, var(--red), #d6324f); border-color: var(--red); }
  .key.wide { font-size: 22px; }
  .key.action { color: var(--amber); }

  /* ---------- Summary ---------- */
  .big-score {
    text-align: center;
    font-size: 64px;
    font-weight: 900;
    margin: 8px 0 0;
    background: linear-gradient(90deg, var(--green), var(--amber));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
  .scard {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .scard .k { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .scard .v { font-size: 26px; font-weight: 900; margin-top: 4px; }

  .seed-line {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-2);
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 14px;
    font-size: 14px;
  }
  .seed-line .code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 800;
    color: var(--accent-2);
    flex: 1;
    word-break: break-all;
  }
  .mini-btn {
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--panel);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
  .mini-btn:active { transform: scale(0.96); }

  .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }

  .tip-card {
    background: linear-gradient(180deg, #1e2a42, #17202f);
    border: 1px solid rgba(91,140,255,0.35);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: 0 0 0 3px rgba(91,140,255,0.12), var(--shadow);
    animation: tipIn .3s ease;
  }
  @keyframes tipIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .tip-icon { font-size: 30px; text-align: center; margin-bottom: 10px; }
  .tip-text { font-size: 17px; line-height: 1.55; color: var(--text); font-weight: 500; }

  .settings-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 14px 18px;
    margin-top: 8px;
    border-radius: var(--radius);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s ease;
  }
  .settings-toggle:active { background: var(--panel-2); }

  .back-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--panel);
    color: var(--text);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .back-btn:active { background: var(--panel-2); }

  /* ---------- High-score leaderboard ---------- */
  .score-banner {
    text-align: center;
    padding: 14px 18px;
    border-radius: 14px;
    margin-bottom: 14px;
    font-size: 17px;
    font-weight: 800;
  }
  .score-banner.best {
    background: rgba(40,209,124,0.15);
    border: 1px solid rgba(40,209,124,0.4);
    color: var(--green);
  }
  .score-banner.miss {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 10px;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 5px;
  }
  .lb-row:last-child { margin-bottom: 0; }
  .lb-row.lb-current {
    border-color: var(--accent);
    background: rgba(91,140,255,0.12);
  }
  .lb-rank { font-size: 12px; font-weight: 900; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
  .lb-score { font-size: 17px; font-weight: 900; flex: 1; }
  .lb-meta { font-size: 11px; color: var(--muted); text-align: right; }

  /* ---------- Challenges ---------- */
  .challenge-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .challenge-card {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 20px 12px 18px;
    text-align: center;
    cursor: pointer;
    transition: transform .08s ease, border-color .15s ease;
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .challenge-card:active { transform: scale(0.97); }
  .challenge-card.ch-active {
    border-color: var(--accent);
    background: rgba(91,140,255,0.12);
    box-shadow: 0 0 0 2px rgba(91,140,255,0.2), var(--shadow);
  }
  .ch-emoji { font-size: 26px; margin-bottom: 8px; }
  .ch-name { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .ch-tagline { font-size: 12px; color: var(--muted); line-height: 1.4; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ============================================================
   Seeded RNG  (deterministic from a string/number seed)
   ============================================================ */

// xfnv1a string hash -> 32-bit seed
function hashSeed(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// mulberry32 PRNG
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function randInt(rng, min, max) {
  return Math.floor(rng() * (max - min + 1)) + min;
}

function randomSeed() {
  // short, shareable, human-friendly
  const chars = "ACDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

/* ============================================================
   Problem generation
   ------------------------------------------------------------
   Each problem is { left, opSymbol, right, answer }.
   Supported operations: division, multiplication, addition, subtraction.
   Filters (range, rounded, noZero, parity) apply where meaningful.
   ============================================================ */

function passesFilters(left, right, answer, s, op) {
  if (s.noZero && String(answer).indexOf("0") !== -1) return false;
  if (s.parity === "odd"  && (left % 2 === 0 || right % 2 === 0)) return false;
  if (s.parity === "even" && (left % 2 !== 0 || right % 2 !== 0)) return false;
  if (op === "division" && s.rounded && right % 10 !== 0) return false;
  return true;
}

function generateDivision(rng, s) {
  const max = s.range;
  const dMin = s.divisorMin ?? 2;
  const dMax = s.divisorMax != null
    ? Math.min(s.divisorMax, Math.floor(max / 2))
    : Math.max(dMin, Math.min(Math.floor(max / 2), 99));
  for (let i = 0; i < 6000; i++) {
    const right = randInt(rng, dMin, Math.max(dMin, dMax));
    const maxQ = Math.floor(max / right);
    if (maxQ < 2) continue;
    const answer = randInt(rng, 2, maxQ);
    const left = right * answer;
    if (left <= max && passesFilters(left, right, answer, s, "division"))
      return { left, opSymbol: "÷", right, answer };
  }
  const right = dMin;
  const answer = randInt(rng, 2, Math.max(2, Math.floor(max / right)));
  return { left: right * answer, opSymbol: "÷", right, answer };
}

function generateMultiplication(rng, s) {
  const max = s.range;
  const fMax = s.factorMax ?? Math.max(2, Math.floor(Math.sqrt(max)));
  for (let i = 0; i < 6000; i++) {
    const left = randInt(rng, 2, fMax);
    const rightBound = s.factorMax ? fMax : Math.floor(max / left);
    const right = randInt(rng, 2, Math.max(2, rightBound));
    const answer = left * right;
    if (answer >= 2 && passesFilters(left, right, answer, s, "multiplication"))
      return { left, opSymbol: "×", right, answer };
  }
  return { left: 3, opSymbol: "×", right: 4, answer: 12 };
}

function generateAddition(rng, s) {
  const max = s.range;
  for (let i = 0; i < 6000; i++) {
    const left = randInt(rng, 1, max - 1);
    const right = randInt(rng, 1, max - left);
    const answer = left + right;
    if (answer >= 2 && answer <= max && passesFilters(left, right, answer, s, "addition"))
      return { left, opSymbol: "+", right, answer };
  }
  return { left: 12, opSymbol: "+", right: 34, answer: 46 };
}

function generateSubtraction(rng, s) {
  const max = s.range;
  for (let i = 0; i < 6000; i++) {
    const left = randInt(rng, 2, max);
    const right = randInt(rng, 1, left - 1);
    const answer = left - right;
    if (answer >= 1 && passesFilters(left, right, answer, s, "subtraction"))
      return { left, opSymbol: "−", right, answer };
  }
  return { left: 50, opSymbol: "−", right: 23, answer: 27 };
}

function buildRounds(seedStr, settings) {
  const rng = mulberry32(hashSeed(seedStr));
  const ops = settings.operations ?? {};
  const enabled = ["division","multiplication","addition","subtraction"].filter((k) => ops[k]);
  if (enabled.length === 0) enabled.push("division");

  const generators = {
    division: generateDivision,
    multiplication: generateMultiplication,
    addition: generateAddition,
    subtraction: generateSubtraction,
  };

  const rounds = [];
  for (let i = 0; i < settings.rounds; i++) {
    const op = enabled[Math.floor(rng() * enabled.length)];
    rounds.push(generators[op](rng, settings));
  }
  return rounds;
}

/* ============================================================
   Default settings  (the baseline every game inherits)
   Shared by the Settings page, the custom game, and every game mode
   below — so a mode is always a complete, predictable configuration.
   ============================================================ */
const DEFAULT_SETTINGS = {
  range: 500,
  rounds: 10,
  timeLimit: 10,
  rounded: false,
  noZero: false,
  parity: "any",
  operations: { division: true, multiplication: false, addition: false, subtraction: false },
  teachMode: false,
};

// Build a full settings object from the defaults plus a mode's specifics.
// `operations` is replaced wholesale so each mode controls exactly which
// operations are in play.
function modeSettings(specifics = {}) {
  return {
    ...DEFAULT_SETTINGS,
    ...specifics,
    operations: { ...DEFAULT_SETTINGS.operations, ...(specifics.operations ?? {}) },
  };
}

/* ============================================================
   Game modes  (curated, self-contained configurations)
   Each mode carries the FULL default settings merged with its own
   constraints, so selecting a mode starts a predictable run that does
   not depend on whatever is currently in the Settings page.
   ============================================================ */
const GAME_MODES = [
  {
    id: "classic",
    emoji: "➗",
    name: "Classic Division",
    tagline: "Mixed divisors — the default blitz",
    settings: modeSettings({}),

/* ============================================================
   High-score persistence
   Scores are stored as an array sorted high → low in localStorage.
   Each record: { score, accuracy, perfectRounds, rounds, seed, date, ts }
   ============================================================ */
const SCORES_KEY = "math-blitz-scores";
const MAX_STORED = 20; // keep up to 20, display top 5

function loadHighScores() {
  try { return JSON.parse(localStorage.getItem(SCORES_KEY)) || []; }
  catch { return []; }
}

function insertHighScore(record, existing) {
  const updated = [...existing, record]
    .sort((a, b) => b.score - a.score)
    .slice(0, MAX_STORED);
  try { localStorage.setItem(SCORES_KEY, JSON.stringify(updated)); } catch {}
  return updated;
}


const basePoints = (pos) => (pos + 1) * 5;

/* ============================================================
   Mental-math tips  (Teach Me Mode)
   Returns a contextual tip for the given problem.
   Multiple variants per pattern — chosen by problem hash for variety.
   ============================================================ */
function getTip({ left, right, answer, opSymbol }) {
  // deterministic pick from an array using the problem numbers as a seed
  const pick = (arr) => arr[(left * 31 + right * 17 + answer * 7) % arr.length];

  const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
  const trailingZeros = (x) => { let c=0; while(x%10===0){c++;x=x/10;} return c; };
  // chunk: find the largest easy multiple of d that fits in n (e.g. 100×d, 10×d, 5×d)
  const chunkTip = (dividend, divisor, quot) => {
    for (const mult of [100,50,25,20,10,5,2]) {
      const chunk = mult * divisor;
      if (chunk < dividend && dividend - chunk > 0 && (dividend - chunk) % divisor === 0) {
        const rem = dividend - chunk, remQ = rem / divisor;
        return `Chunking: ${mult}×${divisor}=${chunk} fits inside ${dividend}. Remainder ${rem}÷${divisor}=${remQ}. Total: ${mult}+${remQ}=${quot}.`;
      }
    }
    return null;
  };

  // ─── DIVISION ─────────────────────────────────────────────
  if (opSymbol === "÷") {
    const digitSum = (x) => String(x).split("").reduce((s, d) => s + +d, 0);

    // Cancel trailing zeros first if both share them
    const tzL = trailingZeros(left), tzR = trailingZeros(right);
    if (tzL > 0 && tzR > 0) {
      const cancel = Math.min(tzL, tzR);
      const sl = left / (10**cancel), sr = right / (10**cancel);
      return pick([
        `Cancel ${cancel} trailing zero${cancel>1?"s":""}: ${left}÷${right} = ${sl}÷${sr} = ${answer}. Always simplify before dividing.`,
        `Both end in ${cancel>1?`${cancel} zeros`:"a zero"}: cross them off. ${sl}÷${sr}=${answer}.`,
      ]);
    }

    // Simplify by GCD > 1 when divisor isn't already a small prime
    const g = gcd(left, right);
    if (g > 1 && right > 12 && g !== right) {
      const sl = left/g, sr = right/g;
      return pick([
        `GCD shortcut: ${left} and ${right} share factor ${g}. Divide both: ${sl}÷${sr}=${answer}.`,
        `Simplify first: both divisible by ${g}. ${left}÷${g}=${sl}, ${right}÷${g}=${sr}. Now ${sl}÷${sr}=${answer}.`,
        `Cancel the common factor (${g}): ${left}÷${right} = ${sl}÷${sr} = ${answer}.`,
      ]);
    }

    // Halve both if both are even
    if (left % 2 === 0 && right % 2 === 0 && right > 4) {
      const hl = left/2, hr = right/2;
      return pick([
        `Both even — halve both sides: ${left}÷${right} = ${hl}÷${hr} = ${answer}. Smaller numbers are easier.`,
        `Halve dividend and divisor together: ${hl}÷${hr}=${answer}. The ratio stays the same.`,
      ]);
    }

    if (right === 2) return pick([
      `Halving: split ${left} into two equal parts. ${left/2} + ${left/2} = ${left} ✓`,
      `÷2 = half. Is ${left} even? Yes — straight halve: ${answer}.`,
      `Think of it as sharing ${left} equally between 2 people: ${answer} each.`,
      `÷2 shortcut: if the number ends in an even digit, halve the last two digits. ${left} → ${answer}.`,
    ]);

    if (right === 3) return pick([
      `÷3 rule: digit sum of ${left} = ${digitSum(left)}, divisible by 3. Answer: ${answer}.`,
      `Think multiplication: 3 × ${answer} = ${left}. Build your 3× table to speed this up.`,
      `Chunking: how many 3s fit in ${Math.floor(left/10)*10}? ${Math.floor(left/10)*10/3|0} × 3 = ${(Math.floor(left/10)*10/3|0)*3}. Then handle the remainder.`,
      `÷3: keep subtracting 3 mentally in groups of 10, 20, 30… How many groups of 3 make ${left}? ${answer}.`,
    ]);

    if (right === 4) return pick([
      `÷4 = halve twice: ${left} → ${left/2} → ${answer}.`,
      `Think quarters: ${left} ÷ 4 is one quarter of ${left}. Half is ${left/2}, half again = ${answer}.`,
      `Halve it: ${left/2}. Is that even? Halve again: ${answer}. Done.`,
      `÷4 shortcut: ÷2 then ÷2. ${left}÷2=${left/2}, ÷2=${answer}.`,
    ]);

    if (right === 5) return pick([
      `÷5 trick: double it, then ÷10. ${left}×2=${left*2}, drop the zero → ${answer}.`,
      `Every multiple of 5 ends in 0 or 5. ${left}÷5: double to ${left*2}, shift decimal → ${answer}.`,
      `Think: how many 5s in ${left}? Same as how many 10s in ${left*2}: ${answer}.`,
      `÷5 = ×0.2. Easier: ×2 ÷10. ${left}×2=${left*2} → ${answer}.`,
    ]);

    if (right === 6) return pick([
      `÷6 = ÷2 then ÷3: ${left}÷2=${left/2}, ÷3=${answer}.`,
      `÷6: halve first (${left/2}), then check if digit sum is divisible by 3. ${left/2}÷3=${answer}.`,
      `Think: 6×${answer}=${left}. Knowing 6× table makes this instant.`,
    ]);

    if (right === 7) return pick([
      `÷7: build the 7× table mentally: 7,14,21,28,35,42,49,56,63,70… ${left} ÷ 7 = ${answer}.`,
      `Flip it: 7×${answer}=${left}. Times-table recall is the fastest route.`,
      `Chunk: 7×${Math.floor(answer/10)*10}=${7*Math.floor(answer/10)*10}, then add 7×${answer%10}=${7*(answer%10)}. Total: ${left}.`,
      `÷7 trick: double the last digit, subtract from the rest. Repeat until small. It's divisible by 7 if you reach 0 or 7.`,
      `Partial quotients: 7×${Math.floor(left/70)*10}=${Math.floor(left/70)*10*7}, remainder ${left-Math.floor(left/70)*10*7}. ÷7=${answer}.`,
    ]);

    if (right === 8) return pick([
      `÷8 = halve 3 times: ${left} → ${left/2} → ${left/4} → ${answer}.`,
      `Think eighths: ${left}÷8. Half = ${left/2}, quarter = ${left/4}, eighth = ${answer}.`,
      `÷8 check: is ${left} divisible by 2 three times over? Yes. ${left}→${left/2}→${left/4}→${answer}.`,
      `÷8: divide by 4 (${left/4}) then by 2 again = ${answer}.`,
    ]);

    if (right === 9) return pick([
      `Flip to ×: 9×${answer}=${left}. Times-table recall beats long division.`,
      `÷9 digit trick: digits of ${left} sum to ${digitSum(left)}. Quotient is ${answer}.`,
      `Think: 9×10=${10*9}, 9×${answer}=${left}. Step through 9× table to land on ${left}.`,
      `÷9: every multiple of 9 has a digit sum that's also a multiple of 9. ${digitSum(left)} → answer is ${answer}.`,
    ]);

    if (right === 10) return pick([
      `÷10: just shift the decimal one place left. ${left} → ${answer}.`,
      `Drop a zero (or move the decimal). ${left}÷10 = ${answer}. Instant.`,
      `Multiplying and dividing by 10 is just about place value. ${left}→${answer}.`,
    ]);

    if (right === 11) return pick([
      `÷11 alternating-digit rule: alternately subtract and add digits of ${left} right-to-left. If result is 0 or divisible by 11, it divides evenly. Answer: ${answer}.`,
      `Flip it: 11×${answer}=${left}. The 11× pattern (11,22,33…) makes this fast.`,
      `÷11 check: for ${left}, alternating digit sum = ${String(left).split("").reduce((s,d,i)=>s+(i%2===0?+d:-+d),0)}. Divisible by 11 → answer is ${answer}.`,
      `Partial quotients: 11×${Math.floor(answer/10)*10}=${11*Math.floor(answer/10)*10}, remainder ${left-11*Math.floor(answer/10)*10}÷11=${answer%10}. Total: ${answer}.`,
    ]);

    if (right === 12) return pick([
      `÷12 = ÷4 then ÷3: ${left}÷4=${left/4}, ÷3=${answer}.`,
      `÷12 = ÷3 then ÷4: ${left}÷3=${left/3}, ÷4=${answer}.`,
      `Think: 12×${answer}=${left}. A strong 12× table is worth memorising.`,
    ]);

    if (right === 15) return pick([
      `÷15 = ÷3 then ÷5: ${left}÷3=${left/3}, ÷5=${answer}.`,
      `÷15 = ÷5 then ÷3: ${left}÷5=${left/5}, ÷3=${answer}.`,
    ]);

    if (right === 20) return pick([
      `÷20 = ÷2 then ÷10: ${left}÷2=${left/2}, ÷10=${answer}.`,
      `Think: 20×${answer}=${left}. 20 is just 2×10 — easy chain.`,
      `Halve first (${left/2}), then drop a zero: ${answer}.`,
    ]);

    if (right === 25) return pick([
      `÷25 trick: ×4 then ÷100. ${left}×4=${left*4}, ÷100=${answer}.`,
      `25 = 100÷4, so ÷25 = ×4÷100. ${left}×4=${left*4} → ${answer}.`,
      `Think quarters of 100: 25×4=100. So ${left}÷25 = ${left}×4÷100 = ${answer}.`,
    ]);

    if (right === 50) return pick([
      `÷50 trick: ×2 then ÷100. ${left}×2=${left*2} → ${answer}.`,
      `50 = 100÷2, so ÷50 = ×2÷100. ${left}×2=${left*2}, ÷100=${answer}.`,
    ]);

    if (right === 100) return pick([
      `÷100: shift decimal two places left. ${left} → ${answer}. Place value — no calculation needed.`,
    ]);

    if (right % 10 === 0) {
      const base = right / 10;
      return pick([
        `${right} = ${base}×10. Divide by ${base} first: ${left}÷${base}=${left/base}, then ÷10 = ${answer}.`,
        `Break it: ÷${base} gives ${left/base}, then ÷10 = ${answer}. Always split round divisors.`,
      ]);
    }

    // factor-pair shortcut if divisor factors cleanly
    for (let f = 2; f <= Math.sqrt(right); f++) {
      if (right % f === 0) {
        const g = right / f;
        return pick([
          `${right} = ${f}×${g}. Divide in steps: ${left}÷${f}=${left/f}, ÷${g}=${answer}.`,
          `Break ${right} into ${f}×${g}: do ${left}÷${f}=${left/f} first, then ÷${g}=${answer}.`,
        ]);
      }
    }

    // try chunking as a specific tip
    const ct = chunkTip(left, right, answer);
    if (ct) return pick([ct,
      `Compatible numbers: round ${left} to the nearest multiple of ${right} to estimate, then adjust.`,
    ]);

    return pick([
      `Build the ${right}× table up to ${left}: …${right}×${answer}=${left}. Repetition makes it automatic.`,
      `Chunking (partial quotients): find a round multiple of ${right} near ${left}, divide that chunk, handle the rest. Answer: ${answer}.`,
      `Estimate first: ${right}×${Math.round(answer/10)*10}≈${right*Math.round(answer/10)*10}. Refine to get ${answer}.`,
      `Compatible numbers: what round multiple of ${right} is close to ${left}? Use it as your starting point, then adjust.`,
    ]);
  }

  // ─── MULTIPLICATION ───────────────────────────────────────
  if (opSymbol === "×") {
    const a = left, b = right;
    const lo = Math.min(a,b), hi = Math.max(a,b);

    if (lo === 2) return pick([
      `×2 = doubling: ${hi}+${hi}=${answer}. Doubling is the fastest mental operation.`,
      `Double ${hi}: add it to itself. ${hi}+${hi}=${answer}.`,
      `×2: picture two rows of ${hi} — total ${answer}.`,
    ]);

    if (lo === 3) return pick([
      `×3 = double then add one more: ${hi}×2=${hi*2}, +${hi}=${answer}.`,
      `Triple ${hi}: ${hi}+${hi}=${hi*2}, +${hi}=${answer}.`,
      `×3: think of three equal groups of ${hi}. ${hi}+${hi}+${hi}=${answer}.`,
    ]);

    if (lo === 4) return pick([
      `×4 = double twice: ${hi}×2=${hi*2}, ×2=${answer}.`,
      `×4: double ${hi} to get ${hi*2}, double again → ${answer}.`,
      `Four groups of ${hi}: halve your target ${answer} twice to check: ${answer/2}, ${hi}. ✓`,
    ]);

    if (lo === 5) return pick([
      `×5: ×10 then halve. ${hi}×10=${hi*10}, ÷2=${answer}.`,
      `Five is half of ten: ${hi}×5 = ${hi}×10÷2 = ${hi*10}÷2 = ${answer}.`,
      `×5 trick: if ${hi} is even, halve it and append 0: ${hi/2}0=${answer}. If odd, result ends in 5.`,
    ]);

    if (lo === 6) return pick([
      `×6 = ×5 + ×1: ${hi}×5=${hi*5}, +${hi}=${answer}.`,
      `×6: double then triple, or triple then double. ${hi}×3=${hi*3}, ×2=${answer}.`,
      `×6 = ×2 × ×3: ${hi}×2=${hi*2}, ×3=${answer}.`,
    ]);

    if (lo === 7) return pick([
      `×7 = ×5 + ×2: ${hi}×5=${hi*5}, +${hi*2}=${answer}.`,
      `×7: hardest single digit. Break it: ${hi}×7 = ${hi}×(5+2) = ${hi*5}+${hi*2} = ${answer}.`,
      `×7 = ×8 − ×1: ${hi}×8=${hi*8}, −${hi}=${answer}.`,
      `Build the 7× table: 7,14,21,28,35,42,49,56,63,70… ${hi}×7=${answer}.`,
    ]);

    if (lo === 8) return pick([
      `×8 = double three times: ${hi}→${hi*2}→${hi*4}→${answer}.`,
      `×8 = ×10 − ×2: ${hi}×10=${hi*10}, −${hi*2}=${answer}.`,
      `Triple-double: ${hi}×2=${hi*2}, ×2=${hi*4}, ×2=${answer}.`,
    ]);

    if (lo === 9) return pick([
      `×9 trick: ×10 then subtract one group. ${hi}×10=${hi*10}, −${hi}=${answer}.`,
      `×9 finger trick: for single-digit ${hi}, hold up ${hi} fingers and put down finger #${lo}… Or just ×10−${hi}=${answer}.`,
      `×9: the digits of the answer always sum to 9 (for single-digit multipliers). ${answer}: ${String(answer).split("").reduce((s,d)=>s+ +d,0)}. ✓`,
      `×9 = ×10 − ×1: ${hi}×10=${hi*10}, subtract ${hi} once = ${answer}.`,
    ]);

    if (lo === 11) return pick([
      lo < 10
        ? `×11 single digit: just write the digit twice. ${hi}×11 = ${answer}.`
        : `×11 two-digit: outer digits stay, middle = digit sum. ${a}×${b}=${answer}.`,
      `×11 = ×10 + ×1: ${hi}×10=${hi*10}, +${hi}=${answer}.`,
    ]);

    if (lo === 12) return pick([
      `×12 = ×10 + ×2: ${hi}×10=${hi*10}, +${hi*2}=${answer}.`,
      `×12: double the number then add ten times the number: ${hi*2}+${hi*10}=${answer}.`,
      `Dozen trick: 12×${hi} — think 10 of them (${hi*10}) plus 2 more (${hi*2}) = ${answer}.`,
    ]);

    if (lo === 15) return pick([
      `×15 = ×10 + ×5: ${hi}×10=${hi*10}, +${hi*5}=${answer}.`,
      `×15 = ×3 × ×5: ${hi}×3=${hi*3}, ×5=${answer}.`,
    ]);

    if (lo === 25) return pick([
      `×25 = ×100÷4: ${hi}×100=${hi*100}, ÷4=${answer}.`,
      `25 is a quarter of 100. ${hi}÷4=${hi/4}, ×100=${answer}.`,
    ]);

    if (lo === 50) return pick([
      `×50 = ×100÷2: ${hi}×100=${hi*100}, ÷2=${answer}.`,
      `50 is half of 100: ${hi}×50 = ${hi}×100÷2 = ${answer}.`,
    ]);

    if (lo === 99) return pick([
      `×99 = ×100 − ×1: ${hi}×100=${hi*100}, −${hi}=${answer}.`,
    ]);

    // near multiple of 10
    const nearHi = Math.round(hi/10)*10, diffHi = hi - nearHi;
    if (Math.abs(diffHi) === 1) return pick([
      `${hi} is 1 away from ${nearHi}: ${lo}×${nearHi}=${lo*nearHi}, then ${diffHi>0?`+${lo}`:`−${lo}`} = ${answer}.`,
      `Round ${hi} to ${nearHi}: ${lo}×${nearHi}=${lo*nearHi}, adjust by ${Math.abs(diffHi)}×${lo}=${Math.abs(diffHi)*lo} → ${answer}.`,
    ]);
    if (Math.abs(diffHi) === 2) return pick([
      `${hi} ≈ ${nearHi}: ${lo}×${nearHi}=${lo*nearHi}, ${diffHi>0?`+${lo*2}`:`−${lo*2}`} = ${answer}.`,
    ]);

    // decompose hi into tens + units
    const hiT = Math.floor(hi/10)*10, hiU = hi%10;
    if (hiT > 0 && hiU > 0) return pick([
      `Break ${hi} = ${hiT}+${hiU}: ${lo}×${hiT}=${lo*hiT}, ${lo}×${hiU}=${lo*hiU}, add → ${answer}.`,
      `Distributive law: ${lo}×${hiT}=${lo*hiT}, ${lo}×${hiU}=${lo*hiU}. Sum: ${answer}.`,
      `Split the bigger number: ${lo}×${hi} = ${lo}×${hiT} + ${lo}×${hiU} = ${lo*hiT}+${lo*hiU}=${answer}.`,
    ]);

    return pick([
      `Break one factor into parts, multiply each, then add. ${a}×${b} = ${answer}.`,
      `Estimate: ${Math.round(a/10)*10}×${Math.round(b/10)*10}≈${Math.round(a/10)*10*Math.round(b/10)*10}. True answer: ${answer}.`,
      `Repeated doubling or halving can simplify any multiplication. Practice finding which factor to split.`,
    ]);
  }

  // ─── ADDITION ─────────────────────────────────────────────
  if (opSymbol === "+") {
    const lo = Math.min(left,right), hi = Math.max(left,right);

    // doubles / near-doubles
    if (left === right) return pick([
      `Double ${left}: ${left}+${left}=${answer}. Doubles are worth memorising cold.`,
      `Same number twice — just double it: ${answer}.`,
    ]);
    if (Math.abs(left-right) === 1) return pick([
      `Near-double: ${lo}+${lo}=${lo*2}, +1=${answer}. Near-doubles are almost as fast as doubles.`,
      `${hi} = ${lo}+1: double ${lo} (=${lo*2}), add 1 = ${answer}.`,
    ]);
    if (Math.abs(left-right) === 2) return pick([
      `Near-double: ${lo}+${lo}=${lo*2}, +2=${answer}.`,
    ]);

    // make-10 / make-100
    const lU = left % 10, rU = right % 10;
    if (lU + rU === 10) return pick([
      `Units make 10 (${lU}+${rU}=10): add tens separately then add 10. (${left-lU}+${right-rU})+10=${answer}.`,
      `"Make a 10": ${lU}+${rU}=10, so just add the tens: ${left-lU}+${right-rU}=${left-lU+right-rU}, +10=${answer}.`,
    ]);
    if (lU + rU < 10) return pick([
      `Units don't carry (${lU}+${rU}=${lU+rU}): add tens then units. ${Math.floor(left/10)*10+Math.floor(right/10)*10}+${lU+rU}=${answer}.`,
      `No carrying needed: (${Math.floor(left/10)*10}+${Math.floor(right/10)*10}) + (${lU}+${rU}) = ${answer}.`,
    ]);

    // make-10 borrow from right
    const comp = 10 - lU;
    if (lU !== 0 && right >= comp) {
      const rounded = left + comp, rem = right - comp;
      return pick([
        `"Make a 10": borrow ${comp} from ${right} → ${left}+${comp}=${rounded}, +${rem}=${answer}.`,
        `Bridge through ${rounded}: ${left}+${comp}=${rounded}, then +${rem}=${answer}.`,
        `Round up ${left} to ${rounded} (add ${comp}), then add the rest (${rem}): ${answer}.`,
      ]);
    }

    // round-and-adjust
    const nearR = Math.round(right/10)*10, diffR = right - nearR;
    if (diffR !== 0) return pick([
      `Round ${right} to ${nearR}: ${left}+${nearR}=${left+nearR}, then ${diffR>0?`+${diffR}`:`${diffR}`}=${answer}.`,
      `Adjust: ${left}+${nearR}=${left+nearR}, correct by ${diffR>0?`adding ${diffR}`:`subtracting ${Math.abs(diffR)}`} → ${answer}.`,
      `Compensate: overshoot to ${nearR}, then correct. ${left+nearR}${diffR<0?`+${Math.abs(diffR)}`:`−${diffR}`}=${answer}.`,
    ]);

    // left-to-right
    const lT=Math.floor(left/10)*10, rT=Math.floor(right/10)*10;
    return pick([
      `Left-to-right: tens (${lT}+${rT}=${lT+rT}) then units (${lU}+${rU}=${lU+rU}). Total: ${answer}.`,
      `Front-end first: ${lT}+${rT}=${lT+rT}, then +${lU+rU}=${answer}.`,
      `Add the big parts first: ${hi}+${Math.floor(lo/10)*10}=${hi+Math.floor(lo/10)*10}, +${lo%10}=${answer}.`,
    ]);
  }

  if (opSymbol === "−") {
    // equal subtraction from round number
    if (left % 10 === 0 || left % 100 === 0) return pick([
      `Subtracting from a round number: ${left}−${right}. Count back: ${left}−${Math.floor(right/10)*10}=${left-Math.floor(right/10)*10}, −${right%10}=${answer}.`,
      `${left} is round — split ${right}: ${left}−${Math.floor(right/10)*10}=${left-Math.floor(right/10)*10}, −${right%10}=${answer}.`,
    ]);

    // count-up (shopkeeper's method)
    const roundUp = Math.ceil(right/10)*10;
    if (roundUp !== right && roundUp < left) {
      const s1=roundUp-right, s2=left-roundUp;
      return pick([
        `Count up from ${right}: +${s1}→${roundUp}, +${s2}→${left}. Gap = ${s1}+${s2}=${answer}.`,
        `Shopkeeper's method: ${right}+${s1}=${roundUp}, +${s2}=${left}. Total added: ${answer}.`,
        `Bridge through ${roundUp}: ${right}→${roundUp} needs ${s1}, then ${roundUp}→${left} needs ${s2}. Sum: ${answer}.`,
      ]);
    }

    // round-and-adjust
    const nearR = Math.round(right/10)*10, diffR = right - nearR;
    if (diffR !== 0) return pick([
      `Round ${right} to ${nearR}: ${left}−${nearR}=${left-nearR}, then ${diffR>0?`−${diffR}`:`+${Math.abs(diffR)}`}=${answer}.`,
      `Adjust: subtract ${nearR} first (${left-nearR}), then ${diffR>0?`take off ${diffR} more`:`add back ${Math.abs(diffR)}`} → ${answer}.`,
      `Compensate: ${left}−${nearR}=${left-nearR}, correct by ${diffR<0?`+${Math.abs(diffR)}`:`−${diffR}`}=${answer}.`,
    ]);

    // near-doubles subtract
    if (left - right === right) return pick([
      `${left} = 2×${right}: taking away half leaves ${answer}.`,
    ]);

    // complement to 100
    if (right + answer === 100) return pick([
      `${right} and ${answer} are complements of 100: ${right}+${answer}=100. Worth memorising pairs.`,
    ]);

    const rT=Math.floor(right/10)*10, rU=right%10;
    if (rT>0 && rU>0) return pick([
      `Split ${right} = ${rT}+${rU}: ${left}−${rT}=${left-rT}, −${rU}=${answer}.`,
      `Subtract tens then units: ${left}−${rT}=${left-rT}, −${rU}=${answer}.`,
      `Chunk: take away ${rT} (→${left-rT}), then ${rU} more (→${answer}).`,
    ]);

    return pick([
      `Count the gap from ${right} to ${left}: that distance is ${answer}.`,
      `Subtract in parts: round down ${right}, then adjust. Answer: ${answer}.`,
      `Picture a number line: jump from ${right} to ${left} in two hops. Total distance: ${answer}.`,
    ]);
  }

  return pick([
    `Every miss reveals a gap to fill. Replay this problem until the answer is automatic.`,
    `Patterns make arithmetic fast. Look for structure: factors, multiples, round numbers nearby.`,
    `Mental math is about shortcuts, not memory alone. What pattern did this problem follow?`,
  ]);
}


/* ============================================================
   Settings Page  (full-page overlay with back button)
   ============================================================ */
function SettingsPage({ initialSettings = {}, onBack }) {
  const [range, setRange] = useState(initialSettings.range ?? DEFAULT_SETTINGS.range);
  const [rounds, setRounds] = useState(initialSettings.rounds ?? DEFAULT_SETTINGS.rounds);
  const [timeLimit, setTimeLimit] = useState(initialSettings.timeLimit ?? DEFAULT_SETTINGS.timeLimit);
  const [teachMode, setTeachMode] = useState(initialSettings.teachMode ?? DEFAULT_SETTINGS.teachMode);

  // Operations and problem rules are now driven by game modes, not the
  // Settings page. Carry through whatever was previously stored (or the
  // defaults) so a custom game still has a complete configuration.
  const save = () => onBack({
    range,
    rounds: Math.max(1, Math.min(99, parseInt(rounds, 10) || DEFAULT_SETTINGS.rounds)),
    timeLimit,
    rounded: initialSettings.rounded ?? DEFAULT_SETTINGS.rounded,
    noZero: initialSettings.noZero ?? DEFAULT_SETTINGS.noZero,
    parity: initialSettings.parity ?? DEFAULT_SETTINGS.parity,
    operations: initialSettings.operations ?? { ...DEFAULT_SETTINGS.operations },
    teachMode,
  });

  const Toggle = ({ on, set, label, hint }) => (
    <div className="toggle-row">
      <div>
        <div className="tlabel">{label}</div>
        {hint && <div className="thint">{hint}</div>}
      </div>
      <button className={"switch" + (on ? " on" : "")} onClick={() => set(!on)} aria-pressed={on} aria-label={label} />
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <button className="back-btn" onClick={save} aria-label="Back">‹</button>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 900 }}>Settings</h2>
      </div>

      <div className="panel">
        <div className="field">
          <span className="label">Number range</span>
          <div className="seg">
            {[100, 500, 1000].map((r) => (
              <button key={r} className={range === r ? "on" : ""} onClick={() => setRange(r)}>{r}</button>
            ))}
          </div>
        </div>

        <div className="row2">
          <div className="field">
            <span className="label">Rounds</span>
            <input type="number" min="1" max="99" value={rounds} onChange={(e) => setRounds(e.target.value)} />
          </div>
          <div className="field">
            <span className="label">Time / round</span>
            <div className="seg">
              {[{ v: 0, t: "∞" }, { v: 5, t: "5s" }, { v: 10, t: "10s" }, { v: 20, t: "20s" }].map((o) => (
                <button key={o.v} className={timeLimit === o.v ? "on" : ""} onClick={() => setTimeLimit(o.v)} style={{ minWidth: 0, padding: "12px 4px" }}>
                  {o.t}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="panel">
        <Toggle
          on={teachMode}
          set={setTeachMode}
          label="Teach Me Mode"
          hint="After a missed question, shows a mental math shortcut for next time"
        />
      </div>

      <button className="start-btn" onClick={save}>Done</button>
    </div>
  );
}

/* ============================================================
   Game Screen
   ============================================================ */
function GameScreen({ seed, settings, rounds, onFinish }) {
  const [roundIdx, setRoundIdx] = useState(0);
  const [locked, setLocked] = useState([]);        // correctly-entered digits so far
  const [score, setScore] = useState(0);
  const [scorePop, setScorePop] = useState(false);
  const [wrongFlash, setWrongFlash] = useState(null); // the wrong digit being flashed
  const [keyFlash, setKeyFlash] = useState(null);  // {digit, kind}
  const [perfectStreak, setPerfectStreak] = useState(0);
  const [timeLeft, setTimeLeft] = useState(settings.timeLimit);
  const [revealAnswer, setRevealAnswer] = useState(false);
  const [tipText, setTipText] = useState(null);
  const [timeBonusDisplay, setTimeBonusDisplay] = useState(null);
  const [paused, setPaused] = useState(false);

  // per-round bookkeeping (refs so timers/handlers see latest)
  const retriedPos = useRef(new Set());   // positions that needed a retry
  const scoredPos = useRef(new Set());    // positions already scored (avoid double count)
  const roundPerfect = useRef(true);
  const advancing = useRef(false);
  const revealing = useRef(false); // true during the correct-answer flash after timeout
  const wrongStreak = useRef(0);   // consecutive wrong taps at current position

  // aggregate stats across the whole run
  const stats = useRef({ firstTryDigits: 0, totalDigits: 0, perfectRounds: 0 });

  const problem = rounds[roundIdx];
  const answerStr = String(problem.answer);
  const pos = locked.length;

  const resetRoundState = useCallback(() => {
    retriedPos.current = new Set();
    scoredPos.current = new Set();
    roundPerfect.current = true;
    advancing.current = false;
    revealing.current = false;
    wrongStreak.current = 0;
    setLocked([]);
    setWrongFlash(null);
    setKeyFlash(null);
    setTimeLeft(settings.timeLimit);
    setRevealAnswer(false);
    setTipText(null);
    setTimeBonusDisplay(null);
  }, [settings.timeLimit]);

  // advance to next round (or finish)
  const finishRound = useCallback(
    (wasPerfect) => {
      if (advancing.current) return;
      advancing.current = true;

      stats.current.totalDigits += answerStr.length;
      if (wasPerfect) {
        stats.current.perfectRounds += 1;
        setPerfectStreak((s) => s + 1);
      } else {
        setPerfectStreak(0);
      }

      setTimeout(() => {
        if (roundIdx + 1 >= rounds.length) {
          onFinish({
            score: scoreRef.current,
            firstTryDigits: stats.current.firstTryDigits,
            totalDigits: stats.current.totalDigits,
            perfectRounds: stats.current.perfectRounds,
          });
        } else {
          setRoundIdx((i) => i + 1);
          resetRoundState();
        }
      }, 480);
    },
    [answerStr.length, roundIdx, rounds.length, onFinish, resetRoundState]
  );

  // keep a ref of score for the finish callback
  const scoreRef = useRef(0);
  useEffect(() => { scoreRef.current = score; }, [score]);

  // timer
  useEffect(() => {
    if (!settings.timeLimit) return;
    if (paused) return;
    if (advancing.current) return;
    if (revealing.current) return;
    if (timeLeft <= 0) {
      // ran out: flash the correct answer briefly, then end the round
      roundPerfect.current = false;
      revealing.current = true;
      setRevealAnswer(true);
      setTimeout(() => {
        if (settings.teachMode) {
          setTipText(getTip(problem));
        } else {
          finishRound(false);
        }
      }, 1200);
      return;
    }
    const id = setTimeout(() => setTimeLeft((t) => +(t - 0.1).toFixed(1)), 100);
    return () => clearTimeout(id);
  }, [timeLeft, settings.timeLimit, finishRound]);

  const flashKey = (digit, kind) => {
    setKeyFlash({ digit, kind });
    setTimeout(() => setKeyFlash(null), 220);
  };

  const handleDigit = (d) => {
    if (paused) return;
    if (advancing.current) return;
    if (revealing.current) return;
    const expected = answerStr[pos];

    if (String(d) === expected) {
      // correct digit
      const firstTry = !retriedPos.current.has(pos);
      if (!scoredPos.current.has(pos)) {
        scoredPos.current.add(pos);
        const worth = firstTry ? basePoints(pos) : Math.round(basePoints(pos) / 5);
        setScore((s) => s + worth);
        setScorePop(true);
        setTimeout(() => setScorePop(false), 250);
        if (firstTry) stats.current.firstTryDigits += 1;
        else roundPerfect.current = false;
      }
      wrongStreak.current = 0;
      flashKey(d, "green");
      const next = [...locked, d];
      setLocked(next);

      if (next.length === answerStr.length) {
        if (settings.timeLimit > 0) {
          const bonus = Math.round(timeLeft * 200 / (settings.timeLimit * settings.timeLimit));
          if (bonus > 0) {
            setScore((s) => s + bonus);
            setTimeBonusDisplay(bonus);
          }
        }
        finishRound(roundPerfect.current);
      } else if (settings.timeLimit) {
        setTimeLeft(settings.timeLimit); // reset clock on each correct digit
      }
    } else {
      // wrong digit: flash red, mark retry, then clear
      retriedPos.current.add(pos);
      roundPerfect.current = false;
      wrongStreak.current += 1;
      flashKey(d, "red");
      setWrongFlash(d);
      if (wrongStreak.current >= 3) {
        // 3 strikes: reveal answer and move on, no points for this position
        revealing.current = true;
        setTimeout(() => {
          setWrongFlash(null);
          setRevealAnswer(true);
          setTimeout(() => {
            if (settings.teachMode) {
              setTipText(getTip(problem));
            } else {
              finishRound(false);
            }
          }, 1200);
        }, 300);
      } else {
        setTimeout(() => setWrongFlash(null), 300);
      }
    }
  };

  const handleBackspace = () => {
    if (advancing.current) return;
    if (wrongFlash !== null) { setWrongFlash(null); return; }
    if (locked.length > 0) setLocked(locked.slice(0, -1));
  };

  // render answer slots
  const slots = [];
  for (let i = 0; i < answerStr.length; i++) {
    let cls = "slot";
    let content = "";
    if (i < locked.length) {
      cls += " locked";
      if (!retriedPos.current.has(i)) cls += " first";
      content = locked[i];
    } else if (revealAnswer) {
      // timeout: show the correct digit in red for all remaining positions
      cls += " wrong reveal";
      content = answerStr[i];
    } else if (i === locked.length) {
      cls += " active";
      if (wrongFlash !== null) { cls += " wrong"; content = wrongFlash; }
    }
    slots.push(<div key={i} className={cls}>{content}</div>);
  }

  const timePct = settings.timeLimit ? Math.max(0, (timeLeft / settings.timeLimit) * 100) : 100;
  const low = settings.timeLimit && timeLeft <= settings.timeLimit * 0.34;

  const keys = ["1","2","3","4","5","6","7","8","9"];

  return (
    <div>
      <div className="gtop">
        <div className="stat">
          <div className="k">Round</div>
          <div className="v">{roundIdx + 1}/{rounds.length}</div>
        </div>
        <div className="stat">
          <div className="k">Score</div>
          <div className={"v" + (scorePop ? " score-pop" : "")}>{score}</div>
          {timeBonusDisplay && <div key={timeBonusDisplay + roundIdx} className="time-bonus">+{timeBonusDisplay}⚡</div>}
        </div>
        <div className="stat">
          <div className="k">Seed</div>
          <div className="v" style={{ fontSize: 16, color: "var(--accent-2)" }}>{seed}</div>
        </div>
      </div>

      <div className="fire-bar">
        {Array.from({ length: perfectStreak }).map((_, i) => (
          <span key={i} style={{ animationDelay: (i * 0.08) + "s" }}>🔥</span>
        ))}
      </div>

      {settings.timeLimit > 0 && (
        <div className="timer-track">
          <div className={"timer-fill" + (low ? " low" : "")} style={{ width: timePct + "%" }} />
        </div>
      )}

      <div className="problem">
        {problem.left}<span className="op">{problem.opSymbol}</span>{problem.right}
      </div>

      <div className="slots">{slots}</div>

      {tipText ? (
        <div className="tip-card">
          <div className="tip-icon">💡</div>
          <div className="tip-text">{tipText}</div>
          <button className="start-btn" style={{ marginTop: 18 }} onClick={() => finishRound(false)}>
            Got it →
          </button>
        </div>
      ) : paused ? (
        <div style={{ textAlign: "center", padding: "32px 0" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>⏸</div>
          <div style={{ color: "var(--muted)", fontSize: 15, marginBottom: 24 }}>Paused — no points for this question</div>
          <button className="start-btn" onClick={() => { roundPerfect.current = false; setPaused(false); }}>
            Resume →
          </button>
        </div>
      ) : (
        <div className="numpad" style={revealAnswer ? { opacity: 0.35, pointerEvents: "none" } : undefined}>
          {keys.map((k) => {
            let cls = "key";
            if (keyFlash && keyFlash.digit === k) cls += keyFlash.kind === "green" ? " flash-green" : " flash-red";
            return (
              <button key={k} className={cls} onClick={() => handleDigit(k)}>{k}</button>
            );
          })}
          <button className="key wide action" onClick={handleBackspace}>⌫</button>
          <button
            className={"key" + (keyFlash && keyFlash.digit === "0" ? (keyFlash.kind === "green" ? " flash-green" : " flash-red") : "")}
            onClick={() => handleDigit("0")}
          >
            0
          </button>
          <button className="key wide action" onClick={() => { roundPerfect.current = false; setPaused(true); }}>⏸</button>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Summary Screen
   ============================================================ */
function SummaryScreen({ seed, settings, result, highScores, prevBest, currentTs, lastMode, onAgain, onQuit }) {
  const accuracy = result.totalDigits > 0
    ? Math.round((result.firstTryDigits / result.totalDigits) * 100)
    : 0;

  const copySeed = () => {
    try { navigator.clipboard.writeText(seed); } catch (e) {}
  };

  const top5 = (highScores || []).slice(0, 5);
  const isNewBest = prevBest === null || result.score > prevBest;
  const activeMode = GAME_MODES.find((m) => m.id === lastMode);

  return (
    <div>
      <h1 className="title">Run Complete</h1>
      <div className="subtitle">
        {result.perfectRounds === settings.rounds
          ? "🔥 Flawless! Every round perfect. 🔥"
          : "Nice work — try to beat it."}
      </div>

      <div className="panel">
        <div className="scard" style={{ background: "transparent", border: "none", padding: 0 }}>
          <div className="k">Total Score</div>
          <div className="big-score">{result.score}</div>
        </div>
        <div className="grid2">
          <div className="scard">
            <div className="k">Rounds</div>
            <div className="v">{settings.rounds}</div>
          </div>
          <div className="scard">
            <div className="k">Accuracy</div>
            <div className="v">{accuracy}%</div>
          </div>
          <div className="scard">
            <div className="k">Perfect Rounds</div>
            <div className="v">{result.perfectRounds} 🔥</div>
          </div>
          <div className="scard">
            <div className="k">Digits Nailed</div>
            <div className="v">{result.firstTryDigits}/{result.totalDigits}</div>
          </div>
        </div>

        <div className="seed-line">
          <span style={{ color: "var(--muted)" }}>Seed</span>
          <span className="code">{seed}</span>
          <button className="mini-btn" onClick={copySeed}>Copy</button>
        </div>
      </div>

      {isNewBest ? (
        <div className="score-banner best">
          🏆 {prevBest === null ? "First run — you're on the board!" : "New personal best!"}
        </div>
      ) : (
        <div className="score-banner miss">
          ▼ {prevBest - result.score} pts from your best ({prevBest})
        </div>
      )}

      {top5.length > 0 && (
        <div className="panel" style={{ padding: "12px 12px 8px", marginBottom: 16 }}>
          <span className="label" style={{ display: "block", marginBottom: 8 }}>Top Scores</span>
          {top5.map((entry, i) => (
            <div key={entry.ts} className={"lb-row" + (entry.ts === currentTs ? " lb-current" : "")}>
              <div className="lb-rank">{i + 1}</div>
              <div className="lb-score">{entry.score}</div>
              <div className="lb-meta">{entry.accuracy}% acc · {entry.date}</div>
            </div>
          ))}
        </div>
      )}

      <button className="start-btn" style={{ marginTop: 4, marginBottom: 10 }} onClick={onAgain}>
        {activeMode ? `${activeMode.emoji} ${activeMode.name} Again →` : "Play Again →"}
      </button>
      <button className="start-btn" style={{ marginBottom: 20, background: "var(--panel)", border: "1px solid rgba(255,255,255,0.1)", color: "var(--muted)", boxShadow: "none" }} onClick={onQuit}>
        Quit
      </button>
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
function App() {
  // screen: "home" | "settings-page" | "game" | "summary"
  const [screen, setScreen] = useState("home");
  const [prevScreen, setPrevScreen] = useState("home"); // where settings was opened from
  const [seed, setSeed] = useState("");
  // gameSettings = the persisted custom configuration edited on the Settings
  // page. playSettings = the settings the *current* run is using (a game
  // mode's own bundle, or gameSettings for a custom run).
  const [gameSettings, setGameSettings] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("math-blitz-settings"));
      return saved ? { ...DEFAULT_SETTINGS, ...saved, operations: { ...DEFAULT_SETTINGS.operations, ...(saved.operations ?? {}) } } : DEFAULT_SETTINGS;
    } catch { return DEFAULT_SETTINGS; }
  });
  const [playSettings, setPlaySettings] = useState(DEFAULT_SETTINGS);
  const [rounds, setRounds] = useState([]);
  const [result, setResult] = useState(null);
  const [gameId, setGameId] = useState(0);
  const [highScores, setHighScores] = useState(() => loadHighScores());
  const [prevBest, setPrevBest] = useState(null);
  const [currentTs, setCurrentTs] = useState(null);
  const [lastMode, setLastMode] = useState(() => {
    try { return localStorage.getItem("math-blitz-mode") || null; } catch { return null; }
  });

  const launch = (finalSeed, settings) => {
    setSeed(finalSeed);
    setPlaySettings(settings);
    setRounds(buildRounds(finalSeed, settings));
    setResult(null);
    setGameId((g) => g + 1);
    setScreen("game");
  };

  const startMode = (mode, seedOverride = null) => {
    setLastMode(mode.id);
    try { localStorage.setItem("math-blitz-mode", mode.id); } catch {}
    launch(seedOverride ?? randomSeed(), mode.settings);
  };

  const playAgain = () => {
    const mode = GAME_MODES.find((m) => m.id === lastMode);
    if (mode) startMode(mode);
    else setScreen("home");
  };

  const finishGame = (res) => {
    if (res === null) { setScreen("home"); return; }
    const existing = loadHighScores();
    const best = existing.length > 0 ? existing[0].score : null;
    const ts = Date.now();
    const acc = res.totalDigits > 0 ? Math.round((res.firstTryDigits / res.totalDigits) * 100) : 0;
    const record = {
      score: res.score,
      accuracy: acc,
      perfectRounds: res.perfectRounds,
      rounds: playSettings.rounds,
      seed,
      date: new Date().toLocaleDateString(),
      ts,
    };
    const updated = insertHighScore(record, existing);
    setHighScores(updated);
    setPrevBest(best);
    setCurrentTs(ts);
    setResult(res);
    setScreen("summary");
  };

  const openSettings = () => {
    setPrevScreen(screen);
    setScreen("settings-page");
  };

  const closeSettings = (newSettings) => {
    setGameSettings(newSettings);
    try { localStorage.setItem("math-blitz-settings", JSON.stringify(newSettings)); } catch {}
    setScreen(prevScreen);
  };

  if (screen === "settings-page")
    return <SettingsPage initialSettings={gameSettings} onBack={closeSettings} />;

  if (screen === "game")
    return (
      <GameScreen
        key={gameId}
        seed={seed}
        settings={playSettings}
        rounds={rounds}
        onFinish={finishGame}
      />
    );

  if (screen === "summary")
    return (
      <SummaryScreen
        seed={seed}
        settings={playSettings}
        result={result}
        highScores={highScores}
        prevBest={prevBest}
        currentTs={currentTs}
        lastMode={lastMode}
        onAgain={playAgain}
        onQuit={() => setScreen("home")}
      />
    );

  return (
    <HomeScreen
      onStartMode={startMode}
      onOpenSettings={openSettings}
      lastMode={lastMode}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
